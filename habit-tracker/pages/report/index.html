<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Report page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" type="text/css" href="../../styles.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="../../js/dropDowns.js"></script>
    <script>

      $(document).ready(function () {
        const apiUrl = "https://ainur-khakimov.ru/habit-tracker"
        const mainButton = window.Telegram.WebApp.MainButton;
        const searchParams = new URLSearchParams(window.location.search);
        const userId = searchParams.get("userId");

        mainButton.text = "???";
        mainButton.enable();
        mainButton.show();
        mainButton.onClick(function () {
          window.Telegram.WebApp.sendData(JSON.stringify(collectData()));
        });

        // Тестовые данные привычек
        const testHabits = [
          {
            id: 1,
            name: "50 отжиманий",
            goal: "50 отжиманий в день",
            currentProgress: 20,
            goalAmount: 50
          },
          {
            id: 2,
            name: "Чтение",
            goal: "30 минут чтения в день",
            currentProgress: 15,
            goalAmount: 30
          },
          {
            id: 3,
            name: "Бег",
            goal: "5 км пробежка",
            currentProgress: 3,
            goalAmount: 5
          }
        ];

        testHabits.forEach(habit => {
          const habitCard = `
            <div class="habit-card" data-id="${habit.id}">
              <div class="habit-content">
                  <h3>${habit.name}</h3>
                  <p>Цель: ${habit.goal}</p>
                  <p>Прогресс: ${habit.currentProgress} из ${habit.goalAmount}</p>
              </div>
              <label class="button-label">
                <a href="https://ainur-khakimov.ru" class="button">
                  <span class="checkmark"><b>📊</b></span>
                </a>
              </label>
              <label class="checkbox-label">
                  <input type="checkbox" class="option-checkbox" name="category-checkbox" value="${habit.id}">
                  <span class="checkmark"><b>🗑️</b></span>
              </label>
            </div>`;
            $('#habit-list').append(habitCard);
        });

        function collectData() { }
      });
    </script>
  </head>

  <body>
    <div id="habit-list"></div>
  </body>
</html>
